# stages/triage.yaml
#
# Stage definition for the triage stage.
# A single agent reads the issue and posts triage output.
# No code changes, no push, no PR.

agents:
  - name: triage
    definition: agents/triage.md

sandbox:
  image: registry.access.redhat.com/ubi9/ubi-minimal:latest
  firewall:
    allow:
      - "api.github.com"
      - "github.com"
      - "api.anthropic.com"
  filesystem:
    workspace: /home/agent/workspace
    readonly:
      - /home/agent/.config

runtime:
  model: claude-sonnet-4-20250514
  max_retries: 1
  timeout_minutes: 30

pre_script: stages/scripts/triage-pre.sh
post_script: stages/scripts/triage-post.sh
