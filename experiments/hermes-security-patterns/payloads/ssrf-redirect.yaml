name: ssrf-redirect
scanner: ssrf_validator
technique: ssrf_redirect
description: >
  A redirect chain where a public URL eventually points to internal
  infrastructure. Tests that each hop in the chain is validated.
expected: blocked
redirect_chain:
  - "https://legitimate-looking-site.com/docs"
  - "http://192.168.1.100/internal-api"
urls:
  - "http://192.168.1.100/internal-api"
  - "http://10.0.0.1:8500/v1/agent/self"
  - "http://172.16.0.1:2379/v2/keys/"
  - "file:///etc/passwd"
  - "gopher://internal:25/"
