name: unicode-bidi-override
scanner: unicode_normalizer
technique: unicode_obfuscation
description: >
  A filename using bidirectional override to visually display as a .txt
  file while actually being an executable.
expected: normalized
text: "review-report\u202Eexe.txt"
clean_text: "review-reportexe.txt"
note: >
  The RLO character (U+202E) reverses the visual rendering so "exe.txt"
  appears as "txt.exe" — making a malicious file look like a text file.
