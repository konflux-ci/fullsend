#
# OpenShell policy: permit all egress.
# This policy allows curl and opencode to reach any HTTPS endpoint.
# Used as the "positive test" in the sandboxing experiment.

version: 1

filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log]
  read_write: [/sandbox, /tmp, /dev/null]
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  allow_all_https:
    name: allow-all-https
    endpoints:
      - host: "*"
        port: 443
        protocol: https
        tls: pass_through
        enforcement: enforce
    binaries:
      - { path: /usr/bin/curl }
      - { path: /usr/local/bin/opencode }
      - { path: /usr/local/bin/node }
