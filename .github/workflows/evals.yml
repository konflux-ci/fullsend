name: Skill Evals

on:
  pull_request:
    branches: [main]
    paths:
      - "skills/**"
      - "hack/evals/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      skills: ${{ steps.changes.outputs.skills }}
      framework_changed: ${{ steps.changes.outputs.framework_changed }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - id: changes
        run: |
          BASE=${{ github.event.pull_request.base.sha || 'HEAD~1' }}
          HEAD=${{ github.event.pull_request.head.sha || 'HEAD' }}

          if git diff --name-only "$BASE" "$HEAD" | grep -q '^hack/evals/'; then
            echo "framework_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "framework_changed=false" >> "$GITHUB_OUTPUT"
          fi

          CHANGED_SKILLS=$(git diff --name-only "$BASE" "$HEAD" \
            | grep '^skills/' \
            | cut -d/ -f2 \
            | sort -u \
            | while read -r skill; do
                if [ -f "skills/$skill/evals.yaml" ]; then
                  echo "$skill"
                fi
              done \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "skills=$CHANGED_SKILLS" >> "$GITHUB_OUTPUT"

  run-evals:
    needs: detect-changes
    if: needs.detect-changes.outputs.framework_changed == 'true' || needs.detect-changes.outputs.skills != '[]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install OpenCode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Set up GCP credentials
        run: |
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}' > "$RUNNER_TEMP/gcp-credentials.json"

      - name: Verify OpenCode
        env:
          GOOGLE_VERTEX_LOCATION: us-central1
          GOOGLE_VERTEX_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-credentials.json
        run: opencode run --print-logs --log-level DEBUG -m google-vertex/gemini-2.5-flash "Say hello"

      - name: Run evals (all skills)
        if: needs.detect-changes.outputs.framework_changed == 'true'
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-credentials.json
          CLAUDE_CODE_USE_VERTEX: "1"
          EVAL_AGENTS: opencode
          EVAL_MODEL_MUTATION: google-vertex/gemini-2.5-flash@default
          EVAL_MODEL_RUNNER: google-vertex/gemini-2.5-flash@default
          EVAL_MODEL_JUDGE: google-vertex/gemini-2.5-flash@default
          GOOGLE_VERTEX_LOCATION: us-central1
          GOOGLE_VERTEX_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          PYTHONUNBUFFERED: "1"
          GH_TOKEN: ${{ github.token }}
        run: make evals

      - name: Run evals (changed skills only)
        if: needs.detect-changes.outputs.framework_changed != 'true'
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-credentials.json
          CLAUDE_CODE_USE_VERTEX: "1"
          EVAL_AGENTS: opencode
          EVAL_MODEL_MUTATION: google-vertex/gemini-2.5-flash@default
          EVAL_MODEL_RUNNER: google-vertex/gemini-2.5-flash@default
          EVAL_MODEL_JUDGE: google-vertex/gemini-2.5-flash@default
          GOOGLE_VERTEX_LOCATION: us-central1
          GOOGLE_VERTEX_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          PYTHONUNBUFFERED: "1"
          GH_TOKEN: ${{ github.token }}
          CHANGED_SKILLS: ${{ needs.detect-changes.outputs.skills }}
        run: |
          echo "$CHANGED_SKILLS" | jq -r '.[]' | while read -r skill; do
            make evals SKILL="$skill"
          done
