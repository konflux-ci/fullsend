name: Secretarial Agent — Meeting Notes to Backlog

on:
  schedule:
    # Mon–Thu at 16:10 UTC ≈ 10 min after the 9–11 AM ET sync ends.
    # (During EDT this is 12:10 PM; during EST it's 11:10 AM.)
    - cron: "10 16 * * 1-4"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview actions without writing to GitHub issues"
        type: boolean
        default: true
      comments_only:
        description: "Only comment on existing issues (skip new issue creation)"
        type: boolean
        default: false
      lookback_hours:
        description: "How many hours back to search for meeting notes"
        type: number
        default: 4

permissions:
  contents: read
  issues: write

concurrency:
  group: secretarial-agent
  cancel-in-progress: false

jobs:
  process-meeting-notes:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build secretarial agent
        run: go build -o secretarial-agent ./cmd/secretarial-agent

      - name: Run secretarial agent
        env:
          # Secrets (required)
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Configuration variables (set in repo Settings → Variables)
          GDRIVE_SEARCH_QUERY: ${{ vars.SECRETARIAL_GDRIVE_SEARCH_QUERY }}
          GDRIVE_NAME_FILTER: ${{ vars.SECRETARIAL_GDRIVE_NAME_FILTER }}
          VERTEX_REGION: ${{ vars.SECRETARIAL_VERTEX_REGION }}
          LLM_MODEL: ${{ vars.SECRETARIAL_LLM_MODEL }}
          ISSUE_LIMIT: ${{ vars.SECRETARIAL_ISSUE_LIMIT }}

          # Runtime
          GITHUB_REPOSITORY: ${{ github.repository }}
          LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours || '3' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          COMMENTS_ONLY: ${{ github.event.inputs.comments_only || 'false' }}
          SECRETARIAL_REPORT_FILE: ${{ runner.temp }}/secretarial-report.txt
          SECRETARIAL_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: ./secretarial-agent

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_SECRETARIAL_WEBHOOK_URL }}
          REPORT_FILE: ${{ runner.temp }}/secretarial-report.txt
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_SECRETARIAL_WEBHOOK_URL not configured, skipping"
            exit 0
          fi
          if [ ! -s "$REPORT_FILE" ]; then
            echo "No report generated, skipping"
            exit 0
          fi

          payload=$(jq -n --rawfile text "$REPORT_FILE" \
            '{ text: $text }')

          curl -sf -X POST -H 'Content-Type: application/json' \
            -d "$payload" "$SLACK_WEBHOOK_URL"
