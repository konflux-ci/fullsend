version: 2

builds:
  - main: ./cmd/fullsend/
    binary: fullsend
    ldflags:
      - -s -w -X github.com/fullsend-ai/fullsend/internal/cli.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: fullsend-ai
    name: fullsend
