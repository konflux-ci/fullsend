skill_name: filing-issues
threshold: 0.8

# Model names use the schema from https://models.dev/model-schema.json#/$defs/Model
models:
  mutation: google-vertex-anthropic/claude-haiku-4-5@default
  runner: google-vertex-anthropic/claude-haiku-4-5@default
  judge: google-vertex-anthropic/claude-haiku-4-5@default

evals:
  - id: asks-clarifying-questions
    title: Vague bug report triggers clarifying questions before filing
    prompt: "File a GitHub issue: the app is slow sometimes"
    expected: >
      The agent asks clarifying questions before attempting to file.
      It should gather more detail about the problem rather than
      immediately creating an issue. It should NOT run gh issue create
      or file anything without getting answers first.
    mutations: 8

  - id: searches-for-duplicates
    title: Agent searches for existing issues before filing
    prompt: "File a bug: login button doesn't work on mobile"
    expected: >
      The agent either (a) searches for existing issues before writing
      a new one, using gh issue list or a similar search to check for
      duplicates and surfacing any potential matches to the user, OR
      (b) recognizes that the bug does not match the current repository
      and asks the user to clarify the target repo before proceeding.
      Either response demonstrates thoughtful pre-filing behavior.
    mutations: 8

  - id: no-solution-in-body
    title: Issue draft does not propose solutions
    prompt: >
      File an issue: our CI pipeline fails when running tests in parallel
      because the database fixtures collide. The tests pass individually
      but fail together about 30% of the time.
    expected: >
      The agent does NOT propose fixes, code changes, or implementation
      recommendations. It either (a) drafts an issue body that describes
      the problem without suggesting a solution, OR (b) recognizes that
      this bug report does not match the current repository and asks
      clarifying questions about which repository to file against before
      proceeding. Asking clarifying questions (including about repo
      context) counts as a pass as long as no solution is proposed.
    mutations: 8

  - id: user-approval-gate
    title: Agent presents draft and waits for approval before filing
    prompt: "File a bug: the search results page returns a 500 error when the query contains special characters like & and %"
    expected: >
      The agent does NOT run gh issue create or file anything immediately.
      It either (a) shows a draft of the issue to the user and waits for
      confirmation before proceeding, OR (b) recognizes that this bug
      does not match the current repository context and asks clarifying
      questions about which repository to file against. Either response
      demonstrates that the agent gates on user input before filing.
    mutations: 8

  - id: label-discovery
    title: Agent fetches available labels from the repository
    prompt: >
      File this feature request in this repo. I have all the details,
      so skip clarifying questions and go straight to drafting.

      Title: Add a glossary of terms to the docs

      What's missing: New contributors struggle with terms like
      "agent drift", "prompt injection", and "intent verification"
      that are used throughout the problem documents without definition.

      What should exist: A glossary page in docs/ that defines key
      terms and is linked from README.md.

      Who is affected: New contributors reading the design documents.

      Severity: Low — no one is blocked, but onboarding is slower
      than it needs to be.
    expected: >
      The agent checks what labels are available in the repository
      using gh label list or equivalent to discover valid labels,
      rather than inventing label names. It should apply appropriate
      labels from the ones that actually exist. If the agent asks
      clarifying questions instead of proceeding to label discovery
      and issue drafting, that is a failure.
    mutations: 8

  - id: identifies-target-repo
    title: Agent determines the correct target repository
    prompt: "I found a typo in a README, can you file an issue for it?"
    expected: >
      The agent does NOT assume a repository and immediately file. It
      explicitly asks the user which repository to file the issue in,
      or confirms the target repository by name before proceeding.
      Asking only about the typo content (what the error is, where it
      appears) without also asking or confirming WHICH REPO to file in
      is a failure — the agent must address repository selection.
    mutations: 8
